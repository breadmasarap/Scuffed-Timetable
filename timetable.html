<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>

function toggleDarkMode() {
    document.body.classList.toggle('dark');
}

// set visibility
for (let username in data.users) {
    data.users[username].visibility = true;
}

// put names inside toolbar
function updateToolbar() {
    // all button
    let name_html = `<div class = "tab active" onclick = updateButton(this) >All</div>`;

    // rest of users
    for (let username in data.users) {
        name_html += `<div class = "tab active" onclick = updateButton(this)> ${username} </div>`;
    };
    document.getElementById("list_names").innerHTML = name_html;
}

// colour coding
function updateColour() {
    let legend_html = ` `
    for (let username in data.users) {
        const user = data.users[username]
        if (data.users[username].visibility == true) {
            legend_html += `
            <span class="leg" style="background: ${user.background_colour}; color: ${user.colour}; display:flex; align-items:center; gap:6px;">
                ${user.image ? `<img src="${user.image}" style="width:16px; height:16px; border-radius:4px;">` : ''}
                ${username} (${user.code})
            </span>`;
        }
    };
    document.getElementById("list_colour").innerHTML = legend_html;
}

function hexToRgb(hex) {
    hex = hex.replace('#','');
    if (hex.length === 3) {
        hex = hex.split('').map(x => x + x).join('');
    }
    const num = parseInt(hex, 16);
    return {
        r: (num >> 16) & 255,
        g: (num >> 8) & 255,
        b: num & 255
    };
}

function rgbToHex(r, g, b) {
    return "#" + [r, g, b].map(x => {
        const hex = x.toString(16);
        return hex.length === 1 ? "0" + hex : hex;
    }).join('');
}

// darken background
function adjustBackground(hex) {
    const {r, g, b} = hexToRgb(hex);
    return rgbToHex(
        Math.floor(r * 0.5),
        Math.floor(g * 0.5),
        Math.floor(b * 0.5)
    );
}

// brighten text
function adjustText(hex) {
    const {r, g, b} = hexToRgb(hex);
    return rgbToHex(
        Math.min(255, Math.floor(r + (255 - r) * 0.4)),
        Math.min(255, Math.floor(g + (255 - g) * 0.4)),
        Math.min(255, Math.floor(b + (255 - b) * 0.4))
    );
}
// display timetable
function updateTimetable() {
    let timetable_html = ` `
    let start = 0
    let end = 0
    for (let username in data.users) {
        const user = data.users[username]
        for (let day_index in data.users[username]["timetable"]) {
            const day = data.users[username]["timetable"][day_index]
            if ((start == 0 || start > parseInt(day.start, 10)) && data.users[username].visibility == true) {
                start = parseInt(day.start, 10)
            }
            if ((end == 0 || end < parseInt(day.end, 10)) && data.users[username].visibility == true) {
                end = parseInt(day.end, 10)
            }
        }
    }

    // for loop for hours
    for (let i = start; i < end; i++) {
        timetable_html += `<tr> <td class="tc">${i}:00</td> `

        // for loop for days
        for (let j = 1; j <= 5; j++) {


            timetable_html += `<td>`
            lunch_html = ``

            // for loop for users
            for (let username in data.users) {
                const user = data.users[username] 

                // check each lesson a user has
                for (let day_index in data.users[username]["timetable"]) {
                    const day = data.users[username]["timetable"][day_index]

                    // check if lesson merges with hour and day
                    if (parseInt(day.start, 10) <= i && parseInt(day.end, 10) > i && day.day == j && data.users[username].visibility == true) {
                        
                        // lunch
                        if (day.break == true) {

                            // add commas between names
                            if (lunch_html != ``) {
                                lunch_html += `, `
                            }

                            lunch_html += ` ${username}`
                        
                        // e learning
                        } else if (day.online == true) {
                            timetable_html += `<span class="bl el" style = "background: ${user.background_colour}; color: ${user.colour}"><span class="nm">${username} · ${day.code_name}</span>${day.name} (${day.classroom})</span>`
                        
                        // regular
                        } else {
                            timetable_html += `<span class="bl" style = "background: ${user.background_colour}; color: ${user.colour}"><span class="nm">${username} · ${day.code_name}</span>${day.name} · ${day.classroom}</span>`
                        }
                    }
                }
            }

            // check if lunch is there
            if (lunch_html != ``) {
                timetable_html += `<span class="bl" style = "background: #F0F0F0; color: #999"><span class="nm">`
                lunch_html += `</span>🍽 Lunch</span>`
                timetable_html += lunch_html
            }
            timetable_html += `</td>`
        }
        timetable_html += `</tr>`
    }
    document.getElementById("timetable").innerHTML = timetable_html;
}

function isDarkMode() {
    return document.body.classList.contains('dark');
}

// display certain users
function updateButton(button) {
    let username = button.textContent.trim()
    if (username == "All") {
        if (button.classList.contains('active')) {
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            for (let userdata in data.users) {
                data.users[userdata].visibility = false;
            }
                
        } else {
            document.querySelectorAll('.tab').forEach(t=>t.classList.add('active'));
            for (let userdata in data.users) {
                data.users[userdata].visibility = true;
            }

        }
    } else {
        const all_usernames = document.querySelectorAll('#list_names .tab');
        const all_button = Array.from(all_usernames).find(btn => btn.textContent.trim() === 'All');

        
        if (button.classList.contains('active')) {
            button.classList.remove('active');
            all_button.classList.remove('active');
            for (let userdata in data.users) {
                if (username == userdata) {
                    data.users[userdata].visibility = false;
                }
            }

        
        } else {
            button.classList.add('active');
            let check = true
            for (let userdata in data.users) {
                if (username == userdata) {
                    data.users[userdata].visibility = true;
                }

                // checks if all users are enabled
                if (data.users[userdata].visibility == false) {
                    check = false
                }
            }

            // change all button to true
            if (check == true) {
                all_button.classList.add('active');
            }
            
        }
    }  
    updateColour()
    updateTimetable()

}

// export png
function setStatus(msg,t){const s=document.getElementById('status');s.textContent=msg;if(t)setTimeout(()=>s.textContent='',t);}
function exportPNG(){
  setStatus('Generating...');
  html2canvas(document.getElementById('capture-area'),{scale:2,backgroundColor: isDarkMode() ? '#1e1e1e' : '#ffffff'}).then(c=>{
    const a=document.createElement('a');a.download='group_schedule.png';a.href=c.toDataURL('image/png');a.click();
    setStatus('Downloaded!',2500);
  }).catch(()=>setStatus('Error, try again',2500));
}


// run all functions
updateToolbar()
updateColour()
updateTimetable()
</script>
